<!DOCTYPE html>
<html lang="zh-Hans">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description"
        content="JGS — WASM-powered DCT-domain image scrambler. Pure-Rust core, selectable chroma subsampling, runs entirely in your browser.">
    <title>JGS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">

        <!-- ── WASM / Worker support banner (hidden until check fails) ── -->
        <div id="wasm-error" class="wasm-error" style="display:none" role="alert">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span data-i18n="wasm_not_supported"></span>
        </div>

        <!-- ── Topbar ── -->
        <header class="topbar">
            <div class="topbar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect width="24" height="24" rx="6" fill="var(--accent)" />
                    <rect x="4" y="4" width="7" height="7" rx="1.5" fill="var(--on-accent)" opacity=".9" />
                    <rect x="13" y="4" width="7" height="7" rx="1.5" fill="var(--on-accent)" opacity=".4" />
                    <rect x="4" y="13" width="7" height="7" rx="1.5" fill="var(--on-accent)" opacity=".4" />
                    <rect x="13" y="13" width="7" height="7" rx="1.5" fill="var(--on-accent)" opacity=".9" />
                </svg>
                <span data-i18n="brand">JGS</span>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
                    <svg id="icon-light" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg id="icon-dark" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
                <div class="lang-dropdown" id="lang-dropdown">
                    <button class="lang-trigger" id="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="2" y1="12" x2="22" y2="12" />
                            <path
                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                        </svg>
                        <span id="lang-label">简体</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </button>
                    <div class="lang-menu" id="lang-menu" role="listbox"></div>
                </div>
            </div>
        </header>

        <!-- ── Main layout ── -->
        <div class="main-layout">

            <!-- ── Sidebar ── -->
            <aside class="sidebar" id="sidebar">

                <!-- Step 1: Upload -->
                <div class="sidebar-section">
                    <span class="step-label" data-i18n="step1_label">① 上传图片</span>
                    <div class="upload-zone" id="upload-zone" tabindex="0" role="button" aria-label="Upload image">
                        <div class="upload-zone-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="16 16 12 12 8 16" />
                                <line x1="12" y1="12" x2="12" y2="21" />
                                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                            </svg>
                        </div>
                        <div class="upload-zone-text" data-i18n="upload_text">点击、拖拽或粘贴图片</div>
                        <div class="upload-zone-sub" data-i18n="upload_sub">JPEG · PNG · WebP · GIF · BMP · AVIF</div>
                        <input type="file" id="file-input" accept="image/*" style="display:none" aria-hidden="true">
                    </div>
                    <div class="detect-hint" id="detect-hint" style="display:none" data-i18n="detect_jgs_hint"></div>
                </div>

                <div class="sidebar-divider"></div>

                <!-- Step 2: Password -->
                <div class="sidebar-section">
                    <div class="step-kv">
                        <span class="step-label" data-i18n="step2_label">③ 密码（可选）</span>
                        <span class="key-badge" id="key-badge"></span>
                    </div>
                    <div class="pw-wrap">
                        <input class="field-input pw-text" type="text" id="password" autocomplete="off"
                            autocorrect="off" autocapitalize="off" spellcheck="false"
                            data-i18n-placeholder="password_placeholder">
                        <button class="pw-eye" id="pw-eye" type="button" tabindex="-1"
                            aria-label="Toggle password visibility">
                            <svg id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            <svg id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                style="display:none">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        </button>
                    </div>
                    <div class="field-hint" data-i18n="password_hint">设置密码后，还原时需输入相同密码</div>
                </div>

                <div class="sidebar-divider"></div>

                <!-- Step 3: Output format -->
                <div class="sidebar-section">
                    <span class="step-label" data-i18n="step3_label">③ 输出格式</span>
                    <select class="field-input" id="out-format" aria-label="Output format">
                        <option value="0" selected>JPEG</option>
                        <option value="1">PNG</option>
                    </select>
                    <div class="format-opts" id="format-opts"></div>
                </div>

                <div class="sidebar-divider"></div>

                <!-- Image info -->
                <div class="sidebar-section" id="info-section" style="display:none">
                    <span class="section-label" data-i18n="info_label">图片信息</span>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="k" data-i18n="info_size">尺寸</div>
                            <div class="v" id="info-size">—</div>
                        </div>
                        <div class="info-item">
                            <div class="k" data-i18n="info_blocks">块数</div>
                            <div class="v" id="info-blocks">—</div>
                        </div>
                        <div class="info-item">
                            <div class="k" data-i18n="info_chroma">色度</div>
                            <div class="v" id="info-chroma">—</div>
                        </div>
                        <div class="info-item">
                            <div class="k" data-i18n="info_fmt">格式</div>
                            <div class="v" id="info-fmt">—</div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-divider" id="info-divider" style="display:none"></div>

                <!-- Step 4: Actions -->
                <div class="sidebar-section">
                    <span class="step-label" data-i18n="step4_label">④ 操作</span>
                    <button class="btn btn-primary btn-full" id="btn-scramble" data-i18n="scramble_btn">混淆图片</button>
                    <button class="btn btn-secondary btn-full" id="btn-restore" data-i18n="restore_btn">还原图片</button>
                    <button class="btn btn-ghost btn-sm btn-full" id="btn-reset" data-i18n="reset_btn"
                        style="display:none">重置为原图</button>
                    <button class="btn btn-danger btn-sm btn-full" id="btn-clear" data-i18n="clear_btn">清除全部 ·
                        重新开始</button>
                </div>

            </aside>

            <!-- ── Preview area ── -->
            <main class="preview-area" id="preview-area">

                <div class="preview-toolbar">
                    <div class="preview-tabs" role="tablist">
                        <button class="tab-btn active" id="tab-split" role="tab" aria-selected="true" data-tab="split"
                            data-i18n="tab_split">对比</button>
                        <button class="tab-btn" id="tab-original" role="tab" aria-selected="false" data-tab="original"
                            data-i18n="tab_original">原图</button>
                        <button class="tab-btn" id="tab-result" role="tab" aria-selected="false" data-tab="result"
                            data-i18n="tab_result">结果</button>
                    </div>
                    <div class="toolbar-right">
                        <span class="stale-badge" id="stale-badge" style="display:none" data-i18n="stale_hint"></span>
                        <button class="btn btn-ghost btn-sm" id="btn-download" data-i18n="download_btn">下载结果</button>
                    </div>
                </div>

                <!-- Compare slider view (default) -->
                <div class="compare-outer" id="view-split">
                    <div class="compare-wrap" id="compare-wrap">
                        <div class="compare-layer compare-left">
                            <img id="cmp-orig" src="" alt="Original" style="display:none">
                        </div>
                        <div class="compare-layer compare-right" id="cmp-right-layer">
                            <img id="cmp-result" src="" alt="Result" style="display:none">
                        </div>
                        <div class="compare-divider" id="cmp-divider" style="display:none"></div>
                        <div class="compare-handle" id="cmp-handle" style="display:none">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <!-- left arrow -->
                                <polyline points="9 18 3 12 9 6" />
                                <!-- right arrow -->
                                <polyline points="15 18 21 12 15 6" />
                            </svg>
                        </div>
                        <span class="compare-label compare-label-l" id="cmp-label-l" style="display:none"
                            data-i18n="pane_original">原图</span>
                        <span class="compare-label compare-label-r" id="cmp-label-r" style="display:none"
                            data-i18n="pane_result">结果</span>
                        <div class="compare-empty" id="cmp-empty">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity=".5"
                                aria-hidden="true">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <polyline points="21 15 16 10 5 21" />
                            </svg>
                            <span data-i18n="empty_original">尚未上传图片</span>
                        </div>
                    </div>
                </div>

                <!-- Single views (hidden by default) -->
                <div id="view-original" style="display:none; flex:1; position:relative">
                    <div class="single-view">
                        <img id="sv-orig" src="" alt="Original" style="display:none">
                        <div class="single-empty" id="sv-orig-empty">
                            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity=".5">
                                <rect x="3" y="3" width="18" height="18" rx="2" />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <polyline points="21 15 16 10 5 21" />
                            </svg>
                            <span data-i18n="empty_original">尚未上传图片</span>
                        </div>
                    </div>
                </div>

                <div id="view-result" style="display:none; flex:1; position:relative">
                    <div class="single-view">
                        <img id="sv-result" src="" alt="Result" style="display:none">
                        <div class="single-empty" id="sv-result-empty">
                            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity=".5">
                                <rect x="3" y="3" width="18" height="18" rx="2" />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <polyline points="21 15 16 10 5 21" />
                            </svg>
                            <span data-i18n="empty_result">混淆或还原后显示</span>
                        </div>
                    </div>
                </div>

            </main>
        </div>

        <!-- ── Combined bottom bar (status + footer links) ── -->
        <div class="bottom-bar">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text" data-i18n="status_ready">就绪</span>
            <div class="bottom-bar-links">
                <a href="#" id="link-help" data-i18n="footer_help">使用说明</a>
                <span class="dot">·</span>
                <a href="#" id="link-legal" data-i18n="footer_legal">法律声明</a>
                <span class="dot">·</span>
                <span data-i18n="footer_local">所有处理在本地浏览器完成，图片不会上传</span>
            </div>
        </div>

        <!-- ── Help Modal ── -->
        <div class="overlay" id="overlay-help" role="dialog" aria-modal="true" aria-labelledby="help-title">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="help-title" data-i18n="help_title">使用说明</h2>
                </div>
                <div class="modal-body" id="help-body"></div>
                <div class="modal-footer">
                    <hr class="modal-divider">
                    <button class="modal-close" data-close="overlay-help" data-i18n="close">关闭</button>
                </div>
            </div>
        </div>

        <!-- ── Legal Modal ── -->
        <div class="overlay" id="overlay-legal" role="dialog" aria-modal="true" aria-labelledby="legal-title">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="legal-title" data-i18n="legal_title">法律声明</h2>
                </div>
                <div class="modal-body" id="legal-body"></div>
                <div class="modal-footer">
                    <hr class="modal-divider">
                    <button class="modal-close" data-close="overlay-legal" data-i18n="close">关闭</button>
                </div>
            </div>
        </div>

    </div><!-- #app -->

    <script type="module" src="app.js"></script>
</body>

</html>
